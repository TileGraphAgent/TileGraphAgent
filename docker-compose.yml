version: "3.8"

services:
  neo4j:
    image: neo4j:5.15-community
    environment:
      NEO4J_AUTH: neo4j/password
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_memory_heap_initial__size: 512m
      NEO4J_dbms_memory_heap_max__size: 1g
    ports:
      - "7474:7474"   # HTTP browser
      - "7687:7687"   # Bolt
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
      - ./output/graph:/var/lib/neo4j/import

  tilegraphmcp:
    build:
      context: apps/tilegraphmcp
      dockerfile: Dockerfile
    environment:
      NEO4J_URL: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: password
      NEO4J_DATABASE: neo4j
      SPATIAL_INDEX_PATH: /data/spatial_index.json
      VIEWER_WS_PORT: "9001"
      AUDIT_LOG_PATH: /data/audit.jsonl
    volumes:
      - ./output:/data
    ports:
      - "9001:9001"   # WebSocket bridge to viewer
    depends_on:
      - neo4j

volumes:
  neo4j_data:
  neo4j_logs:
